version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: minimal-list-app
    restart: always
    environment:
      DATABASE_URL: file:./dev.db
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?Set NEXTAUTH_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?Set ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD}
      STORAGE_DRIVER: local
    ports:
      - '3000:3000'
    volumes:
      - ./public:/app/public
      - ./src:/app/src
      - ./prisma:/app/prisma
    command: sh -c "npx prisma db push && npx prisma db seed && npm run dev"
